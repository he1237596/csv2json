stages:
  - sync
  - pages

# 定时/手动触发：下载 CSV + 转换 JSON，一次性提交
sync-all:
  tags:
    - docker
  stage: sync
  image: node:20
  before_script:
    - npm install
  script:
    - node scripts/download-csv.js
    - node scripts/csv2json.js
    - |
      if [ -n "$(git status --porcelain)" ]; then
        echo "有变化，提交..."
        git config user.name "CI Bot"
        git config user.email "ci-bot@gitlab.com"
        git add .
        git commit -m "auto: sync csv and json [skip ci]"
        git pull --rebase http://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git ${CI_COMMIT_REF_NAME}
        git push http://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git HEAD:${CI_COMMIT_REF_NAME}
      else
        echo "没有变化"
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"

# CSV / 脚本变更时：仅转换 JSON
csv-to-json:
  tags:
    - docker
  stage: sync
  image: node:20
  before_script:
    - npm install
  script:
    - node scripts/csv2json.js
    - |
      if [ -n "$(git status --porcelain)" ]; then
        echo "JSON 有变化，提交..."
        git config user.name "CI Bot"
        git config user.email "ci-bot@gitlab.com"
        git add .
        git commit -m "auto: csv to json [skip ci]"
        git pull --rebase http://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git ${CI_COMMIT_REF_NAME}
        git push http://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git HEAD:${CI_COMMIT_REF_NAME}
      else
        echo "JSON 没有变化"
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" || $CI_PIPELINE_SOURCE == "web"
      when: never
    - changes:
        - '**/*.csv'
    - changes:
        - 'scripts/csv2json.js'

pages:
  tags:
    - docker
  stage: pages
  image: node:20-alpine
  before_script:
    - npm install
  script:
    - node scripts/csv2json.js
    - mkdir -p public/simpro public/simmobile
    - cp simpro/*.json public/simpro/ 2>/dev/null || true
    - cp simmobile/*.json public/simmobile/ 2>/dev/null || true
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
